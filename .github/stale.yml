# Github Stale Bot Configuration - Removes issues that are stale 
# Number of days of inactivity before an issue is considered stale (subject to review by maintainers)
daysUntilStale: 120 
# Number of days of inactivity before a stale issue is closed (subject to review by maintainers)
daysUntilClose: 7 
# Only close triaged issues that lack reproduction / clear next steps 
onlyLabels:
    - WaitingForInfo 
# Label to use when marking an issue as stale 
staleLabel: Stale 
# Set to true to ignore issues in a milestone (defaults to false) 
exemptMilestones: true 
# Comment to post when marking an issue as stale. Set to `false` to disable
markComment: >
  This issue has been automatically marked as stale because it has not had
  any recent activity within the past 120 days. It will be closed in 7 days
  if no further activity occurs.
# Comment to post when closing a stale issue. Set to `false` to disable
closeComment: >
  This issue has been automatically closed because it has not had
  any recent activity within the past 127 days. 
  